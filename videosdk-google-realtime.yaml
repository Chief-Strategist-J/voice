version: "1.0"
deployment:
  id: voice_agent_google_realtime
  entry:
    path: packages/python/voice-agent/src/main.py
  env:
    path: packages/python/voice-agent/.env
  secrets:
    VIDEOSDK_AUTH_TOKEN: ${VIDEOSDK_TOKEN}
    PIPELINE_MODE: google_realtime
    AGENT_ID: voice-agent-google-realtime
  deploy:
    cloud: true
