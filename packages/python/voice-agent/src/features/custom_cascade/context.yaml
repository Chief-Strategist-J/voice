name: custom_cascade
description: Mixed provider cascade (Deepgram STT -> Anthropic Claude LLM -> ElevenLabs TTS)
criticality: medium
dependencies:
  - videosdk-plugins-deepgram
  - videosdk-plugins-anthropic
  - videosdk-plugins-elevenlabs
  - videosdk-plugins-silero
  - python-dotenv
  - pyjwt
tracing:
  backend: langfuse (self-hosted)
  compose: ../../../deploy/docker/docker-compose.langfuse.yaml
  enabled_via: TRACING_ENABLED=true in .env
  requires:
    - LANGFUSE_HOST
    - LANGFUSE_PUBLIC_KEY
    - LANGFUSE_SECRET_KEY
