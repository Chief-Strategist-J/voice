services:
  openai-realtime-agent:
    build:
      context: ../../
      dockerfile: build/Dockerfile.openai_realtime
    environment:
      - VIDEOSDK_TOKEN=${VIDEOSDK_TOKEN}
      - VIDEOSDK_MEETING_ID=${VIDEOSDK_MEETING_ID}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    restart: unless-stopped

  google-realtime-agent:
    build:
      context: ../../
      dockerfile: build/Dockerfile.google_realtime
    environment:
      - VIDEOSDK_TOKEN=${VIDEOSDK_TOKEN}
      - VIDEOSDK_MEETING_ID=${VIDEOSDK_MEETING_ID}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    restart: unless-stopped

  google-cascade-agent:
    build:
      context: ../../
      dockerfile: build/Dockerfile.google_cascade
    environment:
      - VIDEOSDK_TOKEN=${VIDEOSDK_TOKEN}
      - VIDEOSDK_MEETING_ID=${VIDEOSDK_MEETING_ID}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    restart: unless-stopped

  sarvam-cascade-agent:
    build:
      context: ../../
      dockerfile: build/Dockerfile.sarvam_cascade
    environment:
      - VIDEOSDK_TOKEN=${VIDEOSDK_TOKEN}
      - VIDEOSDK_MEETING_ID=${VIDEOSDK_MEETING_ID}
      - SARVAM_API_KEY=${SARVAM_API_KEY}
    restart: unless-stopped

  custom-cascade-agent:
    build:
      context: ../../
      dockerfile: build/Dockerfile.custom_cascade
    environment:
      - VIDEOSDK_TOKEN=${VIDEOSDK_TOKEN}
      - VIDEOSDK_MEETING_ID=${VIDEOSDK_MEETING_ID}
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    restart: unless-stopped

  openai-cascade-agent:
    build:
      context: ../../
      dockerfile: build/Dockerfile.openai_cascade
    environment:
      - VIDEOSDK_TOKEN=${VIDEOSDK_TOKEN}
      - VIDEOSDK_MEETING_ID=${VIDEOSDK_MEETING_ID}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    restart: unless-stopped

  sip-agent:
    build:
      context: ../../
      dockerfile: build/Dockerfile.sip
    environment:
      - VIDEOSDK_TOKEN=${VIDEOSDK_TOKEN}
      - VIDEOSDK_MEETING_ID=${VIDEOSDK_MEETING_ID}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    restart: unless-stopped
