version: "1.0"
deployment:
  id: voice_agent_sarvam_cascade
  entry:
    path: packages/python/voice-agent/src/main.py
  env:
    path: packages/python/voice-agent/.env
  secrets:
    VIDEOSDK_AUTH_TOKEN: ${VIDEOSDK_TOKEN}
    PIPELINE_MODE: sarvam_cascade
    AGENT_ID: voice-agent-sarvam-cascade
  deploy:
    cloud: true
